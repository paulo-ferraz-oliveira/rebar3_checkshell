---
name: Erlang CI

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"
  workflow_dispatch: {}

jobs:
  vsns:
    runs-on: ubuntu-24.04
    outputs:
      # renovate datasource: github-runners, depName: ubuntu
      ubuntu: 24.04
      # renovate datasource: github-runners, depName: windows
      windows: 2025
      # renovate datasource: github-runners, depName: macos
      macos: 15

    steps:
      - run: echo "versions set!"

  ci:
    name: Erlang CI
    needs: [vsns]

    strategy:
      fail-fast: false
      matrix:
        include:
          - os-base: ubuntu
            os-vsn: ${{ needs.vsns.outputs.ubuntu }}
          - os-base: windows
            os-vsn: ${{ needs.vsns.outputs.windows }}
          - os-base: macos
            os-vsn: ${{ needs.vsns.outputs.macos }}

    runs-on: ${{matrix.os-base}}-${{matrix.os-vsn}}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: erlef/setup-beam@ee09b1e59bb240681c382eb1f0abc6a04af72764 # v1.23.0
        id: setup-beam
        with:
          version-type: strict
          version-file: .tool-versions

      - name: Restore _build
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: _build
          key: "_build-cache-for\
                -os-${{runner.os}}\
                -otp-${{steps.setup-beam.outputs.otp-version}}\
                -rebar3-${{steps.setup-beam.outputs.rebar3-version}}\
                -hash-${{hashFiles('rebar.lock')}}"

      - name: Restore rebar3's cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/rebar3
          key: "rebar3-cache-for\
                -os-${{runner.os}}\
                -otp-${{steps.setup-beam.outputs.otp-version}}\
                -rebar3-${{steps.setup-beam.outputs.rebar3-version}}\
                -hash-${{hashFiles('rebar.lock')}}"

      - name: Check file format
        run: rebar3 fmt --check
        if: ${{matrix.os-base != 'windows'}}

      - name: Continuous Integration
        run: rebar3 ci
