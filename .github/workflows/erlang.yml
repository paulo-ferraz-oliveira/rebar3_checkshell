---
name: Erlang CI

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"
  workflow_dispatch: {}

jobs:
  vsns:
    runs-on: ubuntu-24.04
    outputs:
      # renovate datasource: github-runners, depName: ubuntu
      ubuntu: 24.04
      # renovate datasource: github-runners, depName: windows
      windows: 2025
      # renovate datasource: github-runners, depName: macos
      macos: 15

    steps:
      - run: echo "versions set!"

  ci:
    name: Erlang CI
    needs: [vsns]

    strategy:
      fail-fast: false
      matrix:
        include:
          - os-base: ubuntu
            os-vsn: ${{ needs.vsns.outputs.ubuntu }}
          - os-base: windows
            os-vsn: ${{ needs.vsns.outputs.windows }}
          - os-base: macos
            os-vsn: ${{ needs.vsns.outputs.macos }}

    runs-on: ${{matrix.os-base}}-${{matrix.os-vsn}}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        id: setup-beam
        with:
          version-type: strict
          version-file: .tool-versions

      - name: Restore _build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: _build
          key: "_build-cache-for\
                -os-${{runner.os}}\
                -otp-${{steps.setup-beam.outputs.otp-version}}\
                -rebar3-${{steps.setup-beam.outputs.rebar3-version}}\
                -hash-${{hashFiles('rebar.lock')}}"

      - name: Restore rebar3's cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/rebar3
          key: "rebar3-cache-for\
                -os-${{runner.os}}\
                -otp-${{steps.setup-beam.outputs.otp-version}}\
                -rebar3-${{steps.setup-beam.outputs.rebar3-version}}\
                -hash-${{hashFiles('rebar.lock')}}"

      - name: Check file format
        run: rebar3 fmt --check
        if: ${{matrix.os-base != 'windows'}}

      - name: Continuous Integration
        run: rebar3 ci
